workflows:
  react-native-android:
    name: React Native Android Release Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      android_signing:
        - keystore_reference
      vars:
        PACKAGE_NAME: "com.abuk10252.uofkchem"
      node: v20

    scripts:
      - name: Install dependencies
        script: |
          nvm use 20
          yarn install

      - name: Expo Prebuild (generate android folder)
        script: |
          npx expo prebuild --platform android --non-interactive

      - name: Configure Android Project
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "newArchEnabled=true" >> android/gradle.properties

      - name: Build Android RELEASE APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease -PversionCode=$BUILD_NUMBER -PversionName=1.0.$BUILD_NUMBER

    artifacts:
      - android/app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - abuk10252@gmail.com
        notify:
          success: true
          failure: true
