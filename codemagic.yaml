workflows:
  react-native-android:
    name: React Native Android Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      android_signing:
        - keystore_reference
      vars:
        PACKAGE_NAME: "com.abuk10252.uofkchem"
      node: v20
    scripts:
      - name: Install dependencies
        script: |
          nvm use 20
          yarn install
      - name: Expo Prebuild
        script: |
          npx expo prebuild --platform android --non-interactive
      - name: Configure Android Project
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          # تفعيل المعمارية الجديدة إجبارياً لإرضاء المكتبات
          cd android && echo "newArchEnabled=true" >> gradle.properties
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -PversionCode=$BUILD_NUMBER -PversionName=1.0.$BUILD_NUMBER
          
          # التأكد من وجود الملف قبل إعادة تسميته لتجنب الخطأ
          IF_FILE="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$IF_FILE" ]; then
            mv "$IF_FILE" app/build/outputs/apk/debug/UofK_Chem.apk
          fi
    artifacts:
      - android/app/build/outputs/apk/debug/UofK_Chem.apk
    publishing:
      email:
        recipients:
          - abuk10252@gmail.com
        notify:
          success: true
          failure: true
          
