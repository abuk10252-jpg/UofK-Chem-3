workflows:
  build-android:
    name: Build Android APK
    max_build_duration: 60

    environment:
      node: latest
      java: 17
      vars:
        EXPO_TOKEN: $EXPO_TOKEN

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Expo Prebuild
        script: |
          npx expo prebuild

      - name: Remove old splashscreen logo
        script: |
          rm -f android/app/src/main/res/drawable/splashscreen_logo.png
          rm -f android/app/src/main/res/drawable-*/splashscreen_logo.png
          rm -f android/app/src/main/res/mipmap-*/splashscreen_logo.png

      - name: Build Android Release APK
        script: |
          cd android
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - "abuk10252@gmail.com"
