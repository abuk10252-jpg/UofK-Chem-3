workflows:
  react-native-android:
    name: React Native Android Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: v20
    scripts:
      - name: Install dependencies
        script: |
          nvm use 20
          yarn install
      - name: Expo Prebuild
        script: |
          npx expo prebuild --platform android --non-interactive
      - name: Force Disable New Arch
        script: |
          # مسح أي تفعيل للمعمارية الجديدة في ملفات المشروع
          sed -i '' 's/newArchEnabled=true/newArchEnabled=false/g' android/gradle.properties || true
          echo "newArchEnabled=false" >> android/gradle.properties
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -PversionCode=$BUILD_NUMBER -PversionName=1.0.$BUILD_NUMBER
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/UofK_Chem.apk
    artifacts:
      - android/app/build/outputs/apk/debug/UofK_Chem.apk
    publishing:
      email:
        recipients:
          - abuk10252@gmail.com
          
