# Updated for Direct APK Download - UofK Chem App
workflows:
  react-native-android:
    name: React Native Android Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      android_signing:
        - keystore_reference # تأكد من رفع ملف الـ keystore في إعدادات Codemagic
      vars:
        PACKAGE_NAME: "your.package.name" # استبدله باسم الحزمة الخاص بتطبيقك
      node: v20
    scripts:
      - name: Install dependencies
        script: |
          nvm use 20
          yarn install
      - name: Expo Prebuild
        script: |
          # هذه الخطوة مهمة جداً لأن مجلد android غير موجود في المستودع
          npx expo prebuild --platform android --non-interactive
      - name: Set Android SDK location
        script: |
          # إنشاء ملف الإعدادات داخل مجلد أندرويد المنشأ حديثاً
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PversionCode=$BUILD_NUMBER \
            -PversionName=1.0.$BUILD_NUMBER
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - your-email@example.com # ضع بريدك الإلكتروني هنا لتصلك النسخة
        notify:
          success: true
          failure: true
          
