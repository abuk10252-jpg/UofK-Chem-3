workflows:
  react-native-android:
    name: React Native Android Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: v20
    scripts:
      - name: Install dependencies
        script: |
          nvm use 20
          yarn install
      - name: Expo Prebuild
        script: |
          npx expo prebuild --platform android --non-interactive
      - name: Configure Gradle
        script: |
          # تفعيل المعمارية الجديدة داخل ملفات الأندرويد إجبارياً
          echo "newArchEnabled=true" >> android/gradle.properties
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -PversionCode=$BUILD_NUMBER -PversionName=1.0.$BUILD_NUMBER
      - name: Finalize APK
        script: |
          # الخطأ الأخير كان هنا، صلحنا المسار عشان التسمية تنجح
          cp android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/UofK_Chem.apk
    artifacts:
      - android/app/build/outputs/apk/debug/UofK_Chem.apk
    publishing:
      email:
        recipients:
          - abuk10252@gmail.com
          
