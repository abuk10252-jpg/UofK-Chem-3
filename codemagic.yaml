workflows:
  react-native-android:
    name: React Native Android Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      android_signing:
        - keystore_reference
      vars:
        PACKAGE_NAME: "com.abuk10252.uofkchem"
      node: v20

    scripts:
      - name: Install dependencies
        script: |
          nvm use 20
          yarn install

      - name: Expo Prebuild
        script: |
          npx expo prebuild --platform android --non-interactive

      - name: Remove old splashscreen logo files
        script: |
          rm -f android/app/src/main/res/drawable/splashscreen_logo.png
          rm -f android/app/src/main/res/drawable-*/splashscreen_logo.png
          rm -f android/app/src/main/res/mipmap-*/splashscreen_logo.png

      - name: Remove splashscreen_logo reference from values.xml
        script: |
          sed -i '' '/splashscreen_logo/d' android/app/src/main/res/values/values.xml || true

      - name: Configure Android Project
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "newArchEnabled=true" >> android/gradle.properties

      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug -PversionCode=$BUILD_NUMBER -PversionName=1.0.$BUILD_NUMBER

    artifacts:
      - android/app/build/outputs/apk/debug/*.apk

    publishing:
      email:
        recipients:
          - abuk10252@gmail.com
        notify:
          success: true
          failure: true
