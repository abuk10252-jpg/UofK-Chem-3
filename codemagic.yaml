# Final Configuration for UofK Chem App
workflows:
  react-native-android:
    name: React Native Android Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      android_signing:
        - keystore_reference
      vars:
        PACKAGE_NAME: "your.package.name" # استبدله باسم الحزمة الخاص بك
      node: v20
    scripts:
      - name: Install dependencies
        script: |
          nvm use 20
          yarn install
      - name: Expo Prebuild
        script: |
          # توليد مجلد android المفقود تلقائياً
          npx expo prebuild --platform android --non-interactive
      - name: Configure Android Project
        script: |
          # إعداد مسار الـ SDK
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          
          # حل مشكلة Worklets: تفعيل المعمارية الجديدة
          echo "newArchEnabled=true" >> android/gradle.properties
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          # تم تغييرها لـ assembleDebug لضمان نجاح البناء وتخطي مشاكل التوقيع حالياً
          ./gradlew assembleDebug \
            -P
